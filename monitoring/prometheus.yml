global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'search-service'
    static_configs:
      - targets: ['search-service:8080']
    metrics_path: /metrics
    scrape_interval: 5s

  - job_name: 'ocr-service'
    static_configs:
      - targets: [ 'ocr-service:8080' ]
    metrics_path: /metrics
    scrape_interval: 5s

  - job_name: 'index-service'
    static_configs:
      - targets: [ 'index-service:8080' ]
    metrics_path: /metrics
    scrape_interval: 5s

  - job_name: 'auth-service'
    static_configs:
      - targets: [ 'auth-service:8080' ]
    metrics_path: /metrics
    scrape_interval: 5s

  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:59090']